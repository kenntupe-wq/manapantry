<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManaPantry — A Taste of Polynesia</title>
    <meta name="description" content="ManaPantry is your source for authentic Polynesian goods — premium Kava, island clothing, and traditional Pacific snacks and candy.">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0c09; --bg2: #171210; --bg3: #1e1812; --surface: #231c15;
            --border: #2e2318; --tan: #9a7c5e; --gold: #c9952a; --ocean: #1e5f6e;
            --cream: #f0e6d6; --text: #e8ddd0; --text-muted: #8a7060;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; }
        h1,h2,h3 { font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 0.05em; }

        /* Navigation */
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(15,12,9,0.95), transparent); backdrop-filter: blur(10px); }
        .logo { font-size: 24px; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 600; text-decoration: none; color: var(--text); }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        .cart-trigger { position: relative; cursor: pointer; }
        .cart-count { position: absolute; -10px; right: -12px; background: var(--gold); color: #000; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px; }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, var(--bg3) 0%, var(--bg) 100%); padding: 20px; }
        .hero h1 { font-size: clamp(40px, 8vw, 100px); color: var(--cream); margin-bottom: 10px; }
        .hero p { font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: clamp(18px, 3vw, 24px); color: var(--tan); opacity: 0.8; }

        /* Categories */
        .categories { padding: 100px 50px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 1400px; margin: 0 auto; }
        .cat-card { height: 200px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; transition: 0.5s; position: relative; overflow: hidden; }
        .cat-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .cat-card span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; z-index: 2; }

        /* Products Grid */
        .products-section { padding: 0 50px 100px; max-width: 1400px; margin: 0 auto; }
        .section-header { margin-bottom: 50px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; }
        
        .product-card { background: var(--bg2); border: 1px solid var(--border); transition: 0.5s; position: relative; }
        .product-card:hover { border-color: var(--tan); }
        .product-img { height: 350px; display: flex; align-items: center; justify-content: center; font-size: 80px; background: var(--surface); position: relative; }
        .product-info { padding: 25px; }
        .product-category { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--tan); margin-bottom: 8px; }
        .product-name { font-size: 20px; margin-bottom: 10px; color: var(--cream); }
        .product-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; height: 45px; overflow: hidden; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; }
        .product-price { font-size: 18px; color: var(--gold); }
        .product-price .old { font-size: 14px; text-decoration: line-through; color: var(--text-muted); margin-right: 8px; }
        .add-to-cart { background: none; border: 1px solid var(--gold); color: var(--gold); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.3s; font-size: 20px; }
        .add-to-cart:hover { background: var(--gold); color: #000; }

        /* Cart Sidebar */
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: var(--bg2); border-left: 1px solid var(--border); z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; }
        .cart-item-img { width: 60px; height: 60px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .cart-item-info { flex-grow: 1; }
        .cart-item-name { font-size: 14px; margin-bottom: 4px; }
        .cart-item-price { font-size: 13px; color: var(--gold); }
        .cart-item-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }
        .cart-total { padding-top: 25px; border-top: 1px solid var(--border); margin-top: 20px; }
        .checkout-btn { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; cursor: pointer; margin-top: 20px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); opacity: 0; pointer-events: none; transition: 0.5s; z-index: 900; }
        .overlay.active { opacity: 1; pointer-events: all; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ocean); color: white; padding: 15px 30px; transition: 0.5s; z-index: 2000; border-top: 3px solid var(--gold); }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .no-products { text-align: center; grid-column: 1 / -1; padding: 60px; border: 1px dashed var(--border); color: var(--text-muted); font-style: italic; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">MANAPANTRY</a>
        <div class="nav-links">
            <a href="#products">Shop</a>
            <a href="#story">Our Story</a>
            <div class="cart-trigger" onclick="toggleCart(true)">
                Cart <span class="cart-count" id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1>ManaPantry</h1>
        <p>Bringing the spirit of the islands to your door.</p>
    </div>

    <div class="categories">
        <div class="cat-card" onclick="filterProducts('Kava', this)"><span>Premium Kava</span></div>
        <div class="cat-card" onclick="filterProducts('Apparel', this)"><span>Island Apparel</span></div>
        <div class="cat-card" onclick="filterProducts('Goods', this)"><span>Pacific Goods</span></div>
    </div>

    <section class="products-section" id="products">
        <div class="section-header">
            <h2>Current Offerings</h2>
            <div style="font-size: 11px; text-transform: uppercase; color: var(--tan); cursor: pointer;" onclick="filterProducts('All')">View All</div>
        </div>
        <div class="products-grid" id="products-grid"></div>
    </section>

    <div class="overlay" onclick="toggleCart(false)"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Basket</h3>
            <div style="cursor:pointer" onclick="toggleCart(false)">✕</div>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-total">
            <div style="display:flex; justify-content:space-between">
                <span>Total</span>
                <span id="cart-total-val">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <div id="toast">Added to cart! 🥥</div>

    <script>
        // ─── DATA LOAD ───
        const products = JSON.parse(localStorage.getItem('mana_products')) || [
            { id: 1, name: "Premium Waka Kava", price: 45.00, emoji: "🥣", category: "Kava", active: true, desc: "Traditional grind, strong noble variety." },
            { id: 2, name: "Island Floral Shirt", price: 38.00, emoji: "🌺", category: "Apparel", active: true, desc: "Hand-printed hibiscus patterns." },
            { id: 3, name: "Pacific Coconut Oil", price: 18.00, emoji: "🥥", category: "Goods", active: true, desc: "Cold-pressed, organic island oil." },
            { id: 4, name: "Dried Mango Slices", price: 12.00, emoji: "🥭", category: "Goods", active: true, desc: "Naturally sweet, no added sugar." }
        ];

        let cart = [];

        // ─── RENDER ───
        function renderProducts(filter = 'All') {
            const grid = document.getElementById('products-grid');
            const filtered = products.filter(p => (filter === 'All' || p.category === filter) && p.active !== false);

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-products">No items found in this category.</div>';
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-img">
                        ${p.oldPrice ? '<div style="position:absolute; top:15px; left:15px; background:var(--gold); color:#000; padding:4px 10px; font-size:10px; font-weight:600; text-transform:uppercase;">Sale</div>' : ''}
                        ${p.emoji}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.category}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.desc || 'Authentic Polynesian quality.'}</div>
                        <div class="product-footer">
                            <div class="product-price">
                                ${p.oldPrice ? `<span class="old">$${p.oldPrice.toFixed(2)}</span>` : ''}
                                $${p.price.toFixed(2)}
                            </div>
                            <button class="add-to-cart" onclick="addToCart(${p.id})">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(cat, el) {
            document.querySelectorAll('.cat-card').forEach(c => c.style.borderColor = 'var(--border)');
            if (el) el.style.borderColor = 'var(--gold)';
            renderProducts(cat);
        }

        // ─── CART ───
        function toggleCart(open) {
            document.getElementById('cart-sidebar').classList.toggle('open', open);
            document.querySelector('.overlay').classList.toggle('active', open);
        }

        function addToCart(id) {
            const p = products.find(item => item.id === id);
            cart.push(p);
            updateCartUI();
            showToast(`Added ${p.name} to cart!`);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const count = document.getElementById('cart-count');
            const list = document.getElementById('cart-items');
            const total = document.getElementById('cart-total-val');
            
            count.textContent = cart.length;
            
            if (cart.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding-top:50px; opacity:0.5;">Your cart is empty.</div>';
                total.textContent = '$0.00';
            } else {
                list.innerHTML = cart.map((item, i) => `
                    <div class="cart-item">
                        <div class="cart-item-img">${item.emoji}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${i})">✕</button>
                    </div>
                `).join('');
                
                const sum = cart.reduce((s, p) => s + p.price, 0);
                total.textContent = `$${sum.toFixed(2)}`;
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function checkout() {
            if (!cart.length) return;
            showToast('🚧 Checkout coming soon!');
        }

        // Initialize
        renderProducts();
    </script>
</body>
</html>
