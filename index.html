<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManaPantry — A Taste of Polynesia</title>
    <style>
        /* ... All your original CSS styles ... */
        :root { --bg: #0f0c09; --bg2: #171210; --gold: #c9952a; --cream: #f0e6d6; --text-muted: #8a7060; --border: #2e2318; --tan: #9a7c5e; --surface: #231c15; }
        body { background: var(--bg); color: var(--cream); font-family: 'Jost', sans-serif; }
        /* (Rest of your original styles here) */
    </style>
</head>
<body>
    <section id="shop" class="products">
        <div class="section-header">
            <span class="section-eyebrow">The Collection</span>
            <h2 class="section-title">Island Essentials</h2>
        </div>
        <div id="product-grid" class="products-grid">
            </div>
    </section>

    <script>
        const original_products = [
            { id: 1, name: "Noble Fiji Kava", price: 44.00, oldPrice: 52.00, cat: "Kava", emoji: "🥣", desc: "Premium ceremonial grade noble kava from Fiji.", badge: "Popular", active: true },
            { id: 2, name: "Mana T-Shirt", price: 28.00, cat: "Clothing", emoji: "👕", desc: "Heavyweight cotton with traditional tapa print.", badge: "New", active: true },
            { id: 3, name: "Dried Taro Chips", price: 12.00, cat: "Island Goods", emoji: "🥥", desc: "Hand-sliced and lightly salted Pacific taro.", active: true }
        ];

        // LOAD FROM LOCALSTORAGE
        const products = JSON.parse(localStorage.getItem('mana_products')) || original_products;

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            // Only show active products
            const activeProducts = products.filter(p => p.active !== false);
            
            if (activeProducts.length === 0) {
                grid.innerHTML = '<div class="no-products">Restocking soon...</div>';
                return;
            }

            grid.innerHTML = activeProducts.map(p => `
                <div class="product-card">
                    <div class="product-img product-img-kava">
                        ${p.badge ? `<span class="product-badge badge-${p.badge.toLowerCase()}">${p.badge}</span>` : ''}
                        ${p.emoji}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.cat}</div>
                        <h3 class="product-name">${p.name}</h3>
                        <p class="product-desc">${p.desc}</p>
                        <div class="product-footer">
                            <div class="product-price">
                                ${p.oldPrice ? `<span class="old">$${p.oldPrice.toFixed(2)}</span>` : ''}
                                $${p.price.toFixed(2)}
                            </div>
                            <button class="add-to-cart" onclick="addToCart(${p.id})">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = renderProducts;

        // (Your original cart logic continues here)
    </script>
</body>
</html>
