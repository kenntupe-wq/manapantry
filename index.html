<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManaPantry — A Taste of Polynesia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0c09;
            --bg2: #171210;
            --bg3: #1e1812;
            --surface: #231c15;
            --border: #2e2318;
            --tan: #9a7c5e;
            --gold: #c9952a;
            --ocean: #1e5f6e;
            --ocean-bright: #2d8fa0;
            --leaf: #3a5630;
            --cream: #f0e6d6;
            --cream-dim: #b8a48e;
            --text: #e8ddd0;
            --text-muted: #8a7060;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 0.05em; }

        /* Navigation */
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 30px 60px; display: flex; justify-content: space-between; align-items: center; transition: 0.5s; }
        nav.scrolled { background: rgba(15, 12, 9, 0.9); backdrop-filter: blur(20px); padding: 20px 60px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 24px; text-transform: uppercase; letter-spacing: 0.3em; font-weight: 600; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 15px; }
        .logo-icon { width: 32px; height: 32px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gold); }
        .nav-links { display: flex; gap: 50px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; transition: 0.3s; position: relative; }
        .nav-links a:hover { color: var(--gold); }
        .cart-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold); }

        /* Hero */
        .hero { height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .hero-bg { position: absolute; inset: 0; background: radial-gradient(circle at center, var(--bg3) 0%, var(--bg) 100%); z-index: -1; }
        .hero-content { max-width: 900px; padding: 0 40px; }
        .hero-eyebrow { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5em; color: var(--gold); margin-bottom: 20px; display: block; }
        .hero h1 { font-size: clamp(50px, 10vw, 120px); color: var(--cream); margin-bottom: 20px; line-height: 0.9; }
        .hero p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(20px, 4vw, 32px); color: var(--tan); margin-bottom: 40px; }

        /* Products Section */
        .section { padding: 120px 60px; max-width: 1600px; margin: 0 auto; }
        .section-header { margin-bottom: 80px; }
        .section-title h2 { font-size: 48px; color: var(--cream); margin-bottom: 10px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 60px 40px; }
        .product-card { position: relative; }
        .product-img-wrapper { aspect-ratio: 4/5; background: var(--bg2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 80px; margin-bottom: 30px; transition: 0.5s; position: relative; }
        .product-img-wrapper:hover { border-color: var(--gold); }
        .product-badge { position: absolute; top: 20px; left: 20px; background: var(--gold); color: #000; padding: 5px 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
        
        .product-info h4 { font-size: 22px; color: var(--cream); margin-bottom: 8px; }
        .product-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 15px; display: block; }
        .product-price { font-size: 18px; color: var(--gold); display: flex; gap: 15px; align-items: center; }
        .product-price .old { color: var(--text-muted); text-decoration: line-through; font-size: 15px; }
        .add-to-cart-btn { position: absolute; bottom: 20px; right: 20px; background: white; color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s; opacity: 0; }
        .product-card:hover .add-to-cart-btn { opacity: 1; }

        /* Cart Sidebar */
        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; height: 100vh; background: var(--bg2); z-index: 2000; transition: 0.5s; padding: 60px 50px; border-left: 1px solid var(--border); }
        .cart-sidebar.open { right: 0; }
        .cart-items { margin: 40px 0; max-height: 60vh; overflow-y: auto; }
        .cart-item { display: flex; gap: 20px; margin-bottom: 25px; align-items: center; }
        .cart-item-img { width: 60px; height: 60px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid var(--border); }
        .checkout-btn { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; cursor: pointer; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
        .overlay.active { display: block; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--ocean); color: white; padding: 15px 30px; border-radius: 4px; z-index: 3000; display: none; }
    </style>
</head>
<body>

    <nav id="navbar">
        <a href="#" class="logo"><div class="logo-icon">M</div>MANAPANTRY</a>
        <div class="nav-links">
            <a href="#products">Shop</a>
            <div class="cart-trigger" onclick="toggleCart(true)">Cart (<span id="cart-count">0</span>)</div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <span class="hero-eyebrow">Island Provisions</span>
            <h1>The Mana <br><span style="color:var(--gold)">Pantry</span></h1>
            <p>Authentic Polynesian goods shipped to your door.</p>
        </div>
    </section>

    <section class="section" id="products">
        <div class="section-header">
            <div class="section-title">
                <h2>Our Collection</h2>
            </div>
        </div>
        <div class="products-grid" id="products-grid">
            </div>
    </section>

    <div class="overlay" onclick="toggleCart(false)"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <h3 style="font-size: 28px; color: var(--cream);">Your Basket</h3>
        <div class="cart-items" id="cart-items"></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <span>Total</span>
            <span id="cart-total-val" style="color:var(--gold)">$0.00</span>
        </div>
        <button class="checkout-btn" onclick="showToast('Checkout coming soon!')">Checkout</button>
    </div>

    <div id="toast"></div>

    <script>
        // ─── DATA LOAD ───
        // Check for Admin updates, otherwise use defaults
        const defaultProducts = [
            { id: 1, name: "Noble Fiji Kava", price: 44.00, emoji: "🥣", category: "Kava", active: true },
            { id: 2, name: "Island Floral Shirt", price: 38.00, emoji: "🌺", category: "Apparel", active: true },
            { id: 3, name: "Pacific Coconut Oil", price: 18.00, emoji: "🥥", category: "Goods", active: true }
        ];
        
        const products = JSON.parse(localStorage.getItem('mana_products')) || defaultProducts;
        let cart = [];

        // ─── RENDER ───
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const activeItems = products.filter(p => p.active !== false);
            
            grid.innerHTML = activeItems.map(p => `
                <div class="product-card">
                    <div class="product-img-wrapper">
                        ${p.oldPrice ? `<div class="product-badge">Sale</div>` : ''}
                        ${p.emoji}
                        <button class="add-to-cart-btn" onclick="addToCart(${p.id})">+</button>
                    </div>
                    <div class="product-info">
                        <span class="product-cat">${p.category}</span>
                        <h4>${p.name}</h4>
                        <div class="product-price">
                            ${p.oldPrice ? `<span class="old">$${p.oldPrice.toFixed(2)}</span>` : ''}
                            $${p.price.toFixed(2)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(item => item.id === id);
            cart.push(p);
            updateCartUI();
            showToast(`Added ${p.name} to cart!`);
        }

        function updateCartUI() {
            document.getElementById('cart-count').textContent = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-img">${item.emoji}</div>
                    <div style="flex-grow:1">
                        <div style="font-size:14px;">${item.name}</div>
                        <div style="color:var(--gold);">$${item.price.toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((s, p) => s + p.price, 0);
            document.getElementById('cart-total-val').textContent = `$${total.toFixed(2)}`;
        }

        function toggleCart(open) {
            document.getElementById('cart-sidebar').classList.toggle('open', open);
            document.querySelector('.overlay').classList.toggle('active', open);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });

        renderProducts();
    </script>
</body>
</html>
