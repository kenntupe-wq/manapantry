<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManaPantry — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0c09; --bg2: #171210; --surface: #231c15; --border: #2e2318;
            --tan: #9a7c5e; --gold: #c9952a; --ocean: #1e5f6e; --cream: #f0e6d6;
            --text: #e8ddd0; --text-muted: #8a7060; --green: #3a7a3a; --red: #8b2020;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }
        h1,h2,h3 { font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 0.05em; }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--surface); padding: 40px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; font-family: inherit; width: 100%; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); color: #000; border: none; padding: 12px 24px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { opacity: 0.9; }

        /* Layout */
        header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); padding: 20px; border: 1px solid var(--border); }
        .stat-val { font-size: 24px; color: var(--gold); margin-bottom: 5px; }
        .stat-label { font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.1em; }

        /* Product List */
        .admin-table { background: var(--surface); border: 1px solid var(--border); }
        .table-header { display: grid; grid-template-columns: 60px 2fr 1fr 1fr 100px 100px; padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
        .table-row { display: grid; grid-template-columns: 60px 2fr 1fr 1fr 100px 100px; padding: 15px 20px; border-bottom: 1px solid var(--border); align-items: center; }
        .emoji { font-size: 24px; }
        .prod-name { font-weight: 500; }
        .prod-cat { font-size: 12px; color: var(--text-muted); }
        .price-input { width: 80px; margin-bottom: 0; padding: 5px; }

        /* Actions */
        .add-panel { background: var(--surface); padding: 30px; border: 1px solid var(--border); margin-bottom: 40px; }
        .add-grid { display: grid; grid-template-columns: repeat(4, 1fr) 150px; gap: 15px; }
        .del-btn { background: none; color: var(--red); border: 1px solid var(--red); width: auto; font-size: 12px; padding: 5px 10px; }
        .del-btn:hover { background: var(--red); color: white; }

        /* Save Bar */
        #save-bar { position: fixed; bottom: -100px; left: 0; right: 0; background: var(--gold); color: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 900; }
        #save-bar.visible { bottom: 0; }
        .save-btn { background: #000; color: #fff; width: auto; padding: 8px 30px; }

        /* Toggles */
        .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--bg); transition: .4s; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--text-muted); transition: .4s; }
        input:checked + .slider { background-color: var(--green); border-color: var(--green); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        #toast { position: fixed; top: 20px; right: 20px; background: var(--ocean); color: white; padding: 15px 30px; transform: translateX(200%); transition: 0.5s; z-index: 2000; border-left: 4px solid var(--gold); }
        #toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 30px;">ManaPantry Admin</h2>
            <input type="password" id="pass" placeholder="Enter Password" onkeypress="if(event.key==='Enter') checkLogin()">
            <button onclick="checkLogin()">Access Portal</button>
            <p id="login-err" style="color: var(--red); font-size: 12px; margin-top: 15px; display: none;">Incorrect credentials.</p>
        </div>
    </div>

    <div id="admin-screen" style="display:none;">
        <header>
            <h1>MANAPANTRY <span style="color: var(--gold); font-style: italic;">Admin</span></h1>
            <button onclick="logout()" style="width: auto; background: none; color: var(--text-muted); border: 1px solid var(--border);">Logout</button>
        </header>

        <div class="container">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-val" id="stat-total">0</div>
                    <div class="stat-label">Total Products</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-active">0</div>
                    <div class="stat-label">Active Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-hidden">0</div>
                    <div class="stat-label">Hidden</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-avg">$0</div>
                    <div class="stat-label">Avg Price</div>
                </div>
            </div>

            <div class="add-panel">
                <h3 style="margin-bottom: 20px;">Add New Island Good</h3>
                <div class="add-grid">
                    <input type="text" id="new-name" placeholder="Product Name">
                    <input type="number" id="new-price" placeholder="Price">
                    <select id="new-cat" style="background:var(--bg); color:var(--text); border:1px solid var(--border); padding:10px;">
                        <option>Kava</option>
                        <option>Apparel</option>
                        <option>Goods</option>
                    </select>
                    <input type="text" id="new-emoji" placeholder="Emoji (e.g. 🥣)">
                    <button onclick="addProduct()">Add Item</button>
                </div>
            </div>

            <div class="admin-table">
                <div class="table-header">
                    <div>Icon</div>
                    <div>Product Details</div>
                    <div>Price ($)</div>
                    <div>Sale Price</div>
                    <div>Status</div>
                    <div>Action</div>
                </div>
                <div id="products-list"></div>
            </div>
        </div>

        <div id="save-bar">
            <div>You have <span id="unsaved-count">0</span> items modified.</div>
            <button class="save-btn" onclick="saveProducts()">SAVE CHANGES</button>
        </div>
    </div>

    <div id="toast">Changes saved to the cloud! 🌴</div>

    <script>
        // ─── AUTH ───
        function checkLogin() {
            const pass = document.getElementById('pass').value;
            if (pass === 'mana2024') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-screen').style.display = 'block';
                renderProducts();
                updateStats();
            } else {
                const err = document.getElementById('login-err');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }

        function logout() { location.reload(); }

        // ─── DATA ───
        let products = JSON.parse(localStorage.getItem('mana_products')) || [
            { id: 1, name: "Premium Waka Kava", price: 45.00, emoji: "🥣", category: "Kava", active: true, desc: "Traditional grind, strong noble variety." },
            { id: 2, name: "Island Floral Shirt", price: 38.00, emoji: "🌺", category: "Apparel", active: true, desc: "Hand-printed hibiscus patterns." },
            { id: 3, name: "Pacific Coconut Oil", price: 18.00, emoji: "🥥", category: "Goods", active: true, desc: "Cold-pressed, organic island oil." },
            { id: 4, name: "Dried Mango Slices", price: 12.00, emoji: "🥭", category: "Goods", active: true, desc: "Naturally sweet, no added sugar." }
        ];

        let unsaved = false;

        // ─── RENDER ───
        function renderProducts() {
            const container = document.getElementById('products-list');
            container.innerHTML = products.map(p => `
                <div class="table-row">
                    <div class="emoji">${p.emoji}</div>
                    <div>
                        <div class="prod-name">${p.name}</div>
                        <div class="prod-cat">${p.category}</div>
                    </div>
                    <div>
                        <input type="number" class="price-input" value="${p.price.toFixed(2)}" step="0.01" min="0" onchange="updatePrice(${p.id}, this.value)">
                    </div>
                    <div>
                        <input type="number" class="price-input" value="${p.oldPrice || ''}" step="0.01" min="0" placeholder="—" onchange="updateOldPrice(${p.id}, this.value)">
                    </div>
                    <div>
                        <label class="toggle">
                            <input type="checkbox" ${p.active !== false ? 'checked' : ''} onchange="toggleActive(${p.id})">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div>
                        <button class="del-btn" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const active = products.filter(p => p.active !== false).length;
            const avg = products.length ? (products.reduce((s,p) => s + p.price, 0) / products.length).toFixed(2) : 0;
            document.getElementById('stat-total').textContent = products.length;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-hidden').textContent = products.length - active;
            document.getElementById('stat-avg').textContent = `$${avg}`;
        }

        function markUnsaved() {
            unsaved = true;
            document.getElementById('unsaved-count').textContent = products.length;
            document.getElementById('save-bar').classList.add('visible');
        }

        // ─── ACTIONS ───
        function addProduct() {
            const name = document.getElementById('new-name').value;
            const price = parseFloat(document.getElementById('new-price').value);
            const cat = document.getElementById('new-cat').value;
            const emoji = document.getElementById('new-emoji').value || '📦';
            
            if (!name || !price) return;

            products.unshift({ id: Date.now(), name, price, category: cat, emoji, active: true });
            renderProducts();
            updateStats();
            markUnsaved();

            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            renderProducts();
            updateStats();
            markUnsaved();
        }

        function toggleActive(id) {
            const p = products.find(p => p.id === id);
            if (p) p.active = !p.active;
            updateStats();
            markUnsaved();
        }

        function updatePrice(id, val) {
            const p = products.find(p => p.id === id);
            if (p) p.price = parseFloat(val);
            markUnsaved();
        }

        function updateOldPrice(id, val) {
            const p = products.find(p => p.id === id);
            if (p) p.oldPrice = val ? parseFloat(val) : null;
            markUnsaved();
        }

        function saveProducts() {
            localStorage.setItem('mana_products', JSON.stringify(products));
            unsaved = false;
            document.getElementById('save-bar').classList.remove('visible');
            showToast("Island spirits have saved your changes! 🌴");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
